<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FundFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  {% if not hide_nav %}
  <nav class="topnav">
    <div class="topnav-left">
      {% if request.url.path != '/' %}
        <button type="button" class="topnav-back" id="topnav-back-btn" aria-label="Go back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      {% endif %}
      <a class="topnav-brand" href="/">FundFinder</a>
    </div>
    <div class="topnav-links">
      {% if user is defined and user %}
        <a class="topnav-link" href="/history">History</a>
        <span class="topnav-email">{{ user.email }}</span>
        <form action="/logout" method="post" class="topnav-logout-form">
          <button type="submit" class="topnav-link topnav-logout">Log out</button>
        </form>
      {% endif %}
    </div>
  </nav>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <script>
    (function () {
      var backBtn = document.getElementById('topnav-back-btn');
      if (backBtn) {
        backBtn.addEventListener('click', function () {
          if (document.referrer && document.referrer.indexOf(window.location.origin) === 0 && window.history.length > 1) {
            window.history.back();
          } else {
            window.location.href = '/';
          }
        });
      }
    })();

    (function () {
      function showError(target, title, body) {
        target.outerHTML =
          '<div id="result" class="ff-error">' +
          '<strong>' + title + '</strong>' +
          '<p>' + body + '</p>' +
          '</div>';
      }

      document.body.addEventListener('htmx:responseError', function (evt) {
        var target = evt.detail.target;
        if (!target || target.id !== 'result') return;
        showError(
          target,
          'Something went wrong running that request.',
          'The server returned an error (status ' + evt.detail.xhr.status + '). Try again, or try Screen mode instead of Deep Research.'
        );
      });

      document.body.addEventListener('htmx:sendError', function (evt) {
        var target = evt.detail.target;
        if (!target || target.id !== 'result') return;
        showError(target, 'Could not reach the server.', 'Check your connection and try again.');
      });

      document.body.addEventListener('htmx:timeout', function (evt) {
        var target = evt.detail.target;
        if (!target || target.id !== 'result') return;
        showError(
          target,
          'That request timed out.',
          'This can happen on a slow connection while a research job is still running. Wait a moment and refresh, or try again.'
        );
      });
    })();
  </script>
</body>
</html>
