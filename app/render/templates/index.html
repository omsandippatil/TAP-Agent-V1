{% extends "base.html" %}
{% block content %}
<section class="hero-section">
  <h1>FundFinder</h1>
  <p class="subtitle">Research CSR alignment and fit for prospective funding partners.</p>

  <form hx-post="/screen" hx-target="#result" hx-swap="innerHTML" hx-indicator="none" class="search-form" id="search-form" autocomplete="off">
    <div class="search-field" id="search-field-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" name="company" id="company-input" placeholder="Search a company" required autofocus autocomplete="off">
      <button type="submit" class="search-submit" aria-label="Run research">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M13 6L19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="suggest-dropdown" id="suggest-dropdown"></div>
    </div>

    <div class="mode-toggle">
      <input type="radio" id="mode-screen" name="mode" value="screen" checked>
      <label for="mode-screen">Screen</label>
      <input type="radio" id="mode-deep" name="mode" value="deep">
      <label for="mode-deep">Deep Research</label>
    </div>
  </form>
</section>

<div id="result">
  {% if prefill_job_id %}
    {% include "polling.html" %}
  {% endif %}
</div>

<script>
   (function () {
    var input = document.getElementById('company-input');
    var dropdown = document.getElementById('suggest-dropdown');
    var wrap = document.getElementById('search-field-wrap');
    var form = document.getElementById('search-form');
    var debounceTimer = null;
    var activeIndex = -1;
    var currentItems = [];
    var requestSeq = 0;
    var latestAppliedSeq = 0;

    function closeDropdown() {
      dropdown.innerHTML = '';
      dropdown.classList.remove('open');
      activeIndex = -1;
      currentItems = [];
    }

    function renderResults(results) {
      currentItems = results;
      activeIndex = -1;
      if (!results.length) {
        closeDropdown();
        return;
      }
      dropdown.innerHTML = results.map(function (r, i) {
        var logo = r.logo_url
          ? '<img class="suggest-logo" src="' + r.logo_url + '" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">'
          : '<span class="suggest-logo suggest-logo-placeholder">' + (r.company ? r.company[0].toUpperCase() : '?') + '</span>';
        var score = (r.fit_score !== null && r.fit_score !== undefined) ? r.fit_score + '/100' : '';
        var tier = r.tier_label ? r.tier_label : '';
        return (
          '<div class="suggest-row" data-index="' + i + '" data-screening-id="' + (r.id || '') + '" data-company="' + r.company.replace(/"/g, '&quot;') + '">' +
            logo +
            '<span class="suggest-name">' + r.company + '</span>' +
            (tier ? '<span class="suggest-tier" style="--tier-color:' + (r.tier_color || '#999') + '">' + tier + '</span>' : '') +
            (score ? '<span class="suggest-score">' + score + '</span>' : '') +
          '</div>'
        );
      }).join('');
      dropdown.classList.add('open');
      Array.prototype.forEach.call(dropdown.querySelectorAll('.suggest-row'), function (row) {
        row.addEventListener('mousedown', function (evt) {
          evt.preventDefault();
          evt.stopPropagation();
          var screeningId = row.getAttribute('data-screening-id');
          input.value = '';
          closeDropdown();
          if (screeningId) {
            htmx.ajax('GET', '/results/' + screeningId, { target: '#result', swap: 'innerHTML' });
          }
        });
      });
    }

    function fetchSuggestions(q, seq) {
      fetch('/api/history/search?q=' + encodeURIComponent(q))
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (seq < latestAppliedSeq) return;
          latestAppliedSeq = seq;
          if (input.value.trim() === q) renderResults(data.results || []);
        })
        .catch(function () {
          if (seq >= latestAppliedSeq) closeDropdown();
        });
    }

    input.addEventListener('input', function () {
      var q = input.value.trim();
      clearTimeout(debounceTimer);
      if (q.length < 2) {
        closeDropdown();
        return;
      }
      var seq = ++requestSeq;
      debounceTimer = setTimeout(function () { fetchSuggestions(q, seq); }, 400);
    });

    input.addEventListener('keydown', function (evt) {
      if (evt.key === 'Enter') {
        closeDropdown();
        return;
      }
      if (!dropdown.classList.contains('open')) return;
      var rows = dropdown.querySelectorAll('.suggest-row');
      if (evt.key === 'ArrowDown') {
        evt.preventDefault();
        activeIndex = Math.min(activeIndex + 1, rows.length - 1);
      } else if (evt.key === 'ArrowUp') {
        evt.preventDefault();
        activeIndex = Math.max(activeIndex - 1, -1);
      } else if (evt.key === 'Escape') {
        closeDropdown();
        return;
      } else {
        return;
      }
      Array.prototype.forEach.call(rows, function (row, i) {
        row.classList.toggle('active', i === activeIndex);
      });
    });

    document.addEventListener('click', function (evt) {
      if (!wrap.contains(evt.target)) closeDropdown();
    });

    form.addEventListener('htmx:configRequest', function () {
      closeDropdown();
    });
  })();
</script>
{% endblock %}
