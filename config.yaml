    - "our foundation"
    - "flagship programme"
    - "flagship program"
    - "directly implement"
    - "directly implements"
    - "implemented by our"
    - "our teams on the ground"
    - "employee volunteering"
    - "our volunteers"
    - "in-house programme"
    - "in-house program"
    - "own foundation"

