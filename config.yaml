# ── CSR Maturity signals ──────────────────────────────────────────────────────
# Each signal that is PRESENT adds its score
maturity_signals:
  "csr committee":          3
  "csr policy":             2
  "csr report":             2
  "schedule vii":           2
  "csr-2":                  2
  "impact assessment":      2
  "csr foundation":         3
  "ngo partner":            1
  "third party":            1
  "monitoring":             1
maturity_cap: 10   # total maturity score capped here

# ── India budget tiers (₹ crore) ─────────────────────────────────────────────
india_budget_tiers:
  - min_crore: 100
    score: 10
    label: "Major India CSR (₹100Cr+)"
  - min_crore: 50
    score: 9
    label: "Large (₹50–100Cr)"
  - min_crore: 10
    score: 7
    label: "Mid-large (₹10–50Cr)"
  - min_crore: 5
    score: 6
    label: "Mid (₹5–10Cr)"
  - min_crore: 1
    score: 5
    label: "Small-mid (₹1–5Cr)"
  - min_crore: 0
    score: 3
    label: "Under ₹1Cr"
budget_unknown_score: 5   # Neutral — not penalised for missing data

# ── Source quality scores ─────────────────────────────────────────────────────
source_quality:
  india_csr_page:       10
  mca_portal:            9   # direct MCA master-data fetch (verified)
  mca_via_search:        4   # MCA info via web-search snippets (PROXY, not verified)
  national_csr_portal:   9
  annual_report:         8   # parsed directly from the company's own PDF
  global_annual_report:  6
  partner_search:        5   # partner pages found via targeted search
  people_search:         4   # LinkedIn/search snippets (published by LinkedIn)
  web_search_snippet:    3

# ── Scoring gradient (strict) ─────────────────────────────────────────────────
# Not every company can be green. Only PRIORITY/STRONG go to the partnership
# team — that's what makes the pre-sales engine convert.
score_bands:
  - min: 90
    key: "PRIORITY"
    label: "Priority match — hand to partnership team now"
    color: "#7C3AED"
  - min: 80
    key: "STRONG"
    label: "Strong match — pursue actively with tailored pitch"
    color: "#16A34A"
  - min: 65
    key: "PROMISING"
    label: "Promising — nurture, strengthen the case before outreach"
    color: "#0EA5E9"
  - min: 45
    key: "WATCHLIST"
    label: "Watchlist — revisit quarterly"
    color: "#D97706"
  - min: 0
    key: "LOW"
    label: "Low fit — deprioritise"
    color: "#DC2626"

